name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build && npm run docs

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Clear stale npmrc
        run: rm -f ~/.npmrc

      - name: Debug auth
        run: |
          echo "--- ~/.npmrc ---"
          cat ~/.npmrc || echo "no ~/.npmrc"
          echo "--- .npmrc ---"
          cat .npmrc || echo "no .npmrc"
          echo "--- npm whoami ---"
          npm whoami || echo "not logged in"

      - name: Publish
        run: npm publish
